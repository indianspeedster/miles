name: PR Test (ROCm)

# Manual-only trigger while ROCm CI is being stabilized. Re-add the
# `pull_request:` block once jobs are reliable on the self-hosted runner.
on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite to run via tests/ci/run_suite.py'
        required: true
        type: choice
        default: 'stage-b-short-8-gpu'
        options:
          - stage-b-short-8-gpu
          - stage-b-fast-1-gpu
          - stage-c-ckpt-8-gpu
          - stage-c-long-8-gpu
          - stage-c-lora-8-gpu
          - stage-c-fsdp-8-gpu
          - stage-c-megatron-8-gpu
          - stage-c-precision-8-gpu
      gpu_count:
        description: 'Number of GPUs to reserve (gpu_lock_exec --count)'
        required: true
        type: number
        default: 8
      container_image:
        description: 'Container image to run in (must be present on the runner host)'
        required: false
        type: string
        default: 'rlsys/miles:MI350-355-rocmpatch'
      infinite_run:
        description: 'Run training infinitely'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  run-suite:
    runs-on: [self-hosted, rocm, mi300x]
    container:
      image: ${{ inputs.container_image }}
      options: >
        --device=/dev/kfd
        --device=/dev/dri
        --security-opt seccomp=unconfined
        --group-add video
        --group-add render
        --cap-add=SYS_PTRACE
        --ipc=host
        --shm-size=32g
        --ulimit memlock=-1
        --ulimit stack=67108864
        --memory=0
        --memory-swap=0
        --privileged
        --ulimit nofile=65535:65535
        -v /tmp:/tmp
        -v /it-share/shekhar/miles_ci/models:/root/models
        -v /it-share/shekhar/miles_ci/datasets:/root/datasets
        -v /it-share/shekhar/miles_ci/hf_cache:/root/.cache/huggingface
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    env:
      PYTHONPATH: ${{ github.workspace }}
      GITHUB_COMMIT_NAME: ${{ github.sha }}_${{ github.event.pull_request.number || 'non-pr' }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
      MILES_TEST_ENABLE_INFINITE_RUN: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.infinite_run) || 'false' }}
      MILES_TEST_FEW_GPU: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup Ray processes
        shell: bash
        run: |
          pkill -9 -f 'ray::' 2>/dev/null || true
          pkill -9 -f raylet 2>/dev/null || true
          pkill -9 -f gcs_server 2>/dev/null || true
          pkill -9 -f 'ray-dashboard' 2>/dev/null || true
          pkill -9 sglang 2>/dev/null || true
          ray stop --force 2>/dev/null || true
          rm -rf /tmp/ray/* 2>/dev/null || true
          sleep 3

      - name: Install miles (editable)
        shell: bash
        run: |
          cd $GITHUB_WORKSPACE && pip install -e . --no-deps --break-system-packages

      - name: Execute suite
        shell: bash
        run: |
          python tests/ci/gpu_lock_exec.py --count ${{ inputs.gpu_count }} -- \
            python tests/ci/run_suite.py --hw cuda --suite ${{ inputs.suite }} \
              --enable-retry --max-attempts 2
